// Pull latest state from JSONBin
function cloudFetch(callback) {
  if (JSONBIN_ID === "PASTE_BIN_ID_HERE") { callback(null); return; }
  fetch(JSONBIN_URL + "/latest", {
    headers: { "X-Master-Key": JSONBIN_KEY, "X-Access-Key": JSONBIN_KEY, "X-Bin-Meta": "false" }
  })
  .then(function(r) {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(function(data) {
    _localCache = data;
    callback(data);
  })
  .catch(function(err) {
    console.warn("JSONBin fetch failed:", err);
    callback(null);
  });
}

// Push state to JSONBin (debounced 800ms so rapid picks don't spam)
function cloudPush(data) {
  if (JSONBIN_ID === "PASTE_BIN_ID_HERE") return;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() {
    // First fetch current bin, merge, then save — prevents overwrites
    fetch(JSONBIN_URL + "/latest", {
      headers: { "X-Master-Key": JSONBIN_KEY, "X-Access-Key": JSONBIN_KEY, "X-Bin-Meta": "false" }
    }).then(function(r) {
      return r.ok ? r.json() : {};
    }).catch(function() { return {}; }).then(function(remote) {
      // Merge users: remote users not in local data are preserved
      var mergedUsers = remote.users ? remote.users.slice() : [];
      var localUsers = data.users || [];
      localUsers.forEach(function(lu) {
        var idx = mergedUsers.findIndex(function(ru) { return ru.name === lu.name; });
        if (idx >= 0) mergedUsers[idx] = lu; // update existing
        else mergedUsers.push(lu); // add new
      });
      var merged = Object.assign({}, remote, data, { users: mergedUsers });
      return fetch(JSONBIN_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY, "X-Access-Key": JSONBIN_KEY },
        body: JSON.stringify(merged)
      });
    }).catch(function() {});
  }, 800);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

function getSlotTeams(slotId, picks, bracket) {
  var allSlots = bracket.firstRound.concat(bracket.secondRound).concat(bracket.quarterFinals).concat(bracket.semiFinals).concat(bracket.championship);
  var slot = null;
  for (var i = 0; i < allSlots.length; i++) { if (allSlots[i].id === slotId) { slot = allSlots[i]; break; } }
  if (!slot) return { top: null, bottom: null };
  var top = slot.top || null;
  var bottom = slot.bottom || null;
  if (slot.bottomFrom) bottom = picks[slot.bottomFrom] || null;
  if (slot.fromTop)    top    = picks[slot.fromTop]    || null;
  if (slot.fromBottom) bottom = picks[slot.fromBottom] || null;
  if (slot.topSeed && slot.topName) top = { seed: slot.topSeed, name: slot.topName };
  return { top: top, bottom: bottom };
}

function calcScore(userPicks, results) {
  var baseScore = 0, upsetScore = 0, correct = 0, upsets = 0, possible = 0;
  ROUND_ORDER.forEach(function(round) {
    BRACKET_SLOTS[round].forEach(function(id) {
      var result = results[id], pick = userPicks[id];
      if (result) {
        possible += ROUND_POINTS[round];
        if (pick && pick.name === result.name) {
          baseScore += ROUND_POINTS[round];
          correct++;
          if (result.seed && result.opponentSeed && result.seed > result.opponentSeed) {
            var bonus = Math.round((result.seed - result.opponentSeed) * UPSET_MULT[round]);
            upsetScore += bonus; upsets++;
          }
        }
      }
    });
  });
  return { score: baseScore + upsetScore, baseScore: baseScore, upsetScore: upsetScore, correct: correct, upsets: upsets, possible: possible };
}

function calcMaxScore(userPicks, results, bracket) {
  var earned = 0, earnedBase = 0, earnedUpset = 0, stillPossible = 0;
  ROUND_ORDER.forEach(function(round) {
    BRACKET_SLOTS[round].forEach(function(id) {
      var result = results[id], pick = userPicks[id];
      if (result) {
        if (pick && pick.name === result.name) {
          earned += ROUND_POINTS[round];
          earnedBase += ROUND_POINTS[round];
          if (result.seed && result.opponentSeed && result.seed > result.opponentSeed) {
            var b = Math.round((result.seed - result.opponentSeed) * UPSET_MULT[round]);
            earned += b; earnedUpset += b;
          }
        }
      } else if (pick) {
        stillPossible += ROUND_POINTS[round];
      }
    });
  });
  return { earned: earned, maxPossible: earned + stillPossible, earnedBase: earnedBase, earnedUpset: earnedUpset };
}

  var locked = s3[0], setLocked = s3[1];
  var s4 = useState("home");
  var screen = s4[0], setScreen = s4[1];
  var s5 = useState("");
  var nameInput = s5[0], setNameInput = s5[1];
  var s6 = useState(null);
  var currentUser = s6[0], setCurrentUser = s6[1];
  var s7 = useState("");

  var s10 = useState(false);
  var autoLocked = s10[0], setAutoLocked = s10[1];
  var s11 = useState("ready");
  var syncStatus = s11[0], setSyncStatus = s11[1];
  var s12 = useState("");
  var pinInput = s12[0], setPinInput = s12[1];
  var s13 = useState(false);
  var pinError = s13[0], setPinError = s13[1];

  // Persist to localStorage as fast local cache
  useEffect(function(){ lsSet(LS_USERS, users); }, [users]);
  useEffect(function(){ lsSet(LS_RESULTS, results); }, [results]);
  useEffect(function(){ lsSet(LS_LOCKED, locked); }, [locked]);

  // Push to cloud whenever shared state changes
  useEffect(function(){
    if (syncStatus === "loading") return;
    cloudPush({ users: users, results: results, locked: locked });
    setSyncStatus("synced");
  }, [users, results, locked]);

  // On mount: pull from cloud, merge with local
  useEffect(function(){
    // Safety timeout — show app after 6s even if fetch fails
    var safetyTimer = setTimeout(function(){ setSyncStatus("ready"); }, 3000);

    cloudFetch(function(data) {
      clearTimeout(safetyTimer);
      if (data && data.users) {
        setUsers(data.users);
        setResults(data.results || INITIAL_RESULTS);
        setLocked(data.locked || false);
        lsSet(LS_USERS, data.users);
        lsSet(LS_RESULTS, data.results || INITIAL_RESULTS);
        lsSet(LS_LOCKED, data.locked || false);
      }
      setSyncStatus("ready");
    });

    // Poll for updates every 20 seconds (so leaderboard stays live)
    var pollId = setInterval(function(){
      cloudFetch(function(data){
        if (!data || !data.users) return;
        setUsers(data.users);
        setResults(data.results || INITIAL_RESULTS);
        setLocked(data.locked || false);
      });
    }, 20000);
    return function(){ clearInterval(pollId); clearTimeout(safetyTimer); };
  }, []);

  useEffect(function() {
    function check() { if (Date.now() >= LOCK_TIME.getTime()) { setAutoLocked(true); } }
    check();
    var id = setInterval(check, 10000);
    return function(){ clearInterval(id); };
  }, []);

  var isPicksFrozen = locked || autoLocked;

  // PIN flow state
  var s14 = useState(null); // "new" | "verify" | null
  var pinFlowMode = s14[0], setPinFlowMode = s14[1];
  var s15 = useState(null); // user being authenticated
  var pendingUser = s15[0], setPendingUser = s15[1];

  function handleStart() {
    var name = nameInput.trim();
    if (!name) return;
    var existing = null;
    for (var i = 0; i < users.length; i++) {
      if (users[i].name.toLowerCase() === name.toLowerCase()) { existing = users[i]; break; }
    }
    if (existing) {
      if (existing.pin) {
        // Known user with PIN — ask them to verify
        setPendingUser(existing);
        setPinFlowMode("verify");
        setPinInput("");
        setPinError(false);
      } else {
        // Known user no PIN — just open
        setCurrentUser(existing);
        setScreen("pick");
      }
    } else {
      // New user — prompt to set a PIN
      var nu = { name: name, picks: {}, submitted: false, pin: null };
      setPendingUser(nu);
      setPinFlowMode("new");
      setPinInput("");
      setPinError(false);
    }
  }

  function handlePinSubmit() {
    var pin = pinInput.trim();
    if (pinFlowMode === "new") {
      if (pin.length < 4) { setPinError(true); return; }
      var nu = Object.assign({}, pendingUser, { pin: pin });
      setCurrentUser(nu);
      setUsers(function(prev){ return prev.concat([nu]); });
      setPinFlowMode(null); setPendingUser(null); setPinInput(""); setPinError(false);
      setScreen("pick");
    } else if (pinFlowMode === "verify") {
      if (pin === pendingUser.pin) {
        setCurrentUser(pendingUser);
        setPinFlowMode(null); setPendingUser(null); setPinInput(""); setPinError(false);
        setScreen("pick");
      } else {
        setPinError(true);
      }
    }
  }

  function handleSkipPin() {
    var nu = Object.assign({}, pendingUser, { pin: null });
    setCurrentUser(nu);
    setUsers(function(prev){ return prev.concat([nu]); });
    setPinFlowMode(null); setPendingUser(null); setPinInput(""); setPinError(false);
    setScreen("pick");
  }

  function handlePick(slotId, team) {
    if (isPicksFrozen && currentUser && currentUser.submitted) return;
    setCurrentUser(function(cu) {
      if (!cu) return cu;
      var newPicks = Object.assign({}, cu.picks);
      newPicks[slotId] = team;
      // Cascade: clear downstream picks that are now invalid
      var allIds = ["G1","G2","G3","G4","G5","G6","G7","G8","G9","G10","G11","G12","G13"];
      allIds.forEach(function(id) {
        if (id === slotId) return;
        var teams = getSlotTeams(id, newPicks, INITIAL_BRACKET);
        var curPick = newPicks[id];
        if (curPick && teams.top && teams.bottom) {
          if (curPick.name !== (teams.top && teams.top.name) && curPick.name !== (teams.bottom && teams.bottom.name)) {
            delete newPicks[id];
          }
        }
      });
      var updated = Object.assign({}, cu, { picks: newPicks });
      setUsers(function(prev){ return prev.map(function(u){ return u.name === cu.name ? updated : u; }); });
      return updated;
    });
  }

  function handleSubmit() {
    setCurrentUser(function(cu) {
      if (!cu) return cu;
      var updated = Object.assign({}, cu, { submitted: true });

    e("div", { style:{ maxWidth:480, marginLeft:"auto", marginRight:"auto" } },

        e("div", { style:{ fontSize:9, color:"rgba(255,215,0,0.5)", fontFamily:"'Barlow Condensed'", letterSpacing:"0.25em", marginBottom:8 } }, "2026 ATLANTIC 10 CONFERENCE TOURNAMENT"),
        e("div", { style:{ fontSize:36, fontFamily:"'Oswald'", fontWeight:700, color:"#FFD700", letterSpacing:"0.06em", lineHeight:1.1, marginBottom:8 } }, "CHAMPIONSHIP PICK'EM"),
        e("div", { style:{ fontSize:11, color:"rgba(255,255,255,0.4)", fontFamily:"'Barlow Condensed'", letterSpacing:"0.15em" } }, "PPG PAINTS ARENA · PITTSBURGH · MAR 11–15")
      ),
      e(Countdown, null),
      e("div", { style:{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:8, padding:24 } },
        e("div", { style:{ fontSize:10, color:"rgba(255,215,0,0.6)", fontFamily:"'Barlow Condensed'", letterSpacing:"0.2em", marginBottom:12 } }, "ENTER YOUR NAME"),
        e("div", { style:{ display:"flex", gap:8 } },
          e("input", { value:nameInput, onChange:function(ev){ setNameInput(ev.target.value); }, onKeyDown:function(ev){ if(ev.key==="Enter") handleStart(); }, placeholder:"Your name", style:{ flex:1, background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:4, color:"#fff", fontFamily:"'Barlow Condensed'", fontSize:14, padding:"10px 12px", outline:"none" } }),
          e("button", { onClick:handleStart, style:{ padding:"10px 18px", fontFamily:"'Oswald'", fontSize:12, fontWeight:700, letterSpacing:"0.1em", background: nameInput.trim() ? "rgba(255,215,0,0.15)" : "rgba(255,255,255,0.05)", border:"1px solid " + (nameInput.trim() ? "rgba(255,215,0,0.4)" : "rgba(255,255,255,0.1)"), color: nameInput.trim() ? "#FFD700" : "rgba(255,255,255,0.3)", borderRadius:4, cursor: nameInput.trim() ? "pointer" : "default" } }, "GO →")
        )
      )
    )
  );

  // Pick screen
  var pickScreen = currentUser ? e("div", { style:{ padding:"16px 0" } },
    e("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 12px 8px", flexWrap:"wrap", gap:8 } },
      e("div", null,
        e("div", { style:{ fontSize:16, fontFamily:"'Oswald'", fontWeight:700, color:"#FFD700" } }, currentUser.name + "'s Bracket"),
        e("div", { style:{ fontSize:10, color:"rgba(255,255,255,0.4)", fontFamily:"'Barlow Condensed'" } }, Object.keys(currentUser.picks || {}).length + " / 13 games picked")
      ),
      e("div", { style:{ display:"flex", gap:8, alignItems:"center" } },
        isPicksFrozen ? e("div", { style:{ padding:"6px 12px", background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:4, fontSize:10, color:"#ef4444", fontFamily:"'Barlow Condensed'", letterSpacing:"0.1em" } }, "🔒 PICKS LOCKED") :
        currentUser.submitted ? e("div", { style:{ padding:"6px 12px", background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.3)", borderRadius:4, fontSize:10, color:"#4ade80", fontFamily:"'Barlow Condensed'", letterSpacing:"0.1em" } }, "✅ SUBMITTED") : null,
        allPicked && !isPicksFrozen ? e("button", { onClick:handleSubmit, style:{ padding:"8px 18px", fontFamily:"'Oswald'", fontSize:12, fontWeight:700, letterSpacing:"0.1em", background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.4)", color:"#FFD700", borderRadius:4, cursor:"pointer" } }, "SUBMIT BRACKET →") : null,
        allPicked && isPicksFrozen && currentUser.submitted ? e("button", { onClick:function(){ setScreen("leaderboard"); }, style:{ padding:"8px 16px", fontFamily:"'Oswald'", fontSize:11, fontWeight:600, letterSpacing:"0.1em", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", color:"rgba(255,255,255,0.6)", borderRadius:4, cursor:"pointer" } }, "VIEW STANDINGS") : null
      )
    ),
    e(BracketPicker, { picks:currentUser.picks || {}, onPick:handlePick, locked: isPicksFrozen && currentUser.submitted, results:results, bracket:INITIAL_BRACKET })
  ) : e("div", { style:{ padding:40, textAlign:"center", color:"rgba(255,255,255,0.3)" } }, "Enter your name to fill a bracket.");

  var contentStyle = { maxWidth:1200, margin:"0 auto", padding:"0 0 60px", display:"flex", flexDirection:"column", alignItems:"stretch" };

  // PIN modal
  var pinModal = pinFlowMode ? e("div", { style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center" } },
    e("div", { style:{ background:"#0d1520", border:"1px solid rgba(255,215,0,0.2)", borderRadius:8, padding:"24px 20px", width:"90vw", maxWidth:360, textAlign:"center" } },
      e("div", { style:{ fontSize:24, marginBottom:8 } }, pinFlowMode === "new" ? "🔐" : "🔒"),
      e("div", { style:{ fontSize:14, fontFamily:"'Oswald'", fontWeight:700, color:"#FFD700", letterSpacing:"0.08em", marginBottom:6 } },
        pinFlowMode === "new" ? "SET YOUR PIN" : "ENTER YOUR PIN"
      ),
      e("div", { style:{ fontSize:11, color:"rgba(255,255,255,0.4)", fontFamily:"'Barlow Condensed'", marginBottom:20, lineHeight:1.5 } },
        pinFlowMode === "new"
          ? "Create a PIN to protect your bracket. Only you can edit it. Min 4 digits."
          : "Welcome back, " + (pendingUser ? pendingUser.name : "") + "! Enter your PIN to access your bracket."
      ),
      e("input", { type:"password", inputMode:"numeric", placeholder:"Enter PIN", value:pinInput,
        onChange:function(ev){ setPinInput(ev.target.value); setPinError(false); },
        onKeyDown:function(ev){ if(ev.key==="Enter") handlePinSubmit(); },
        style:{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid " + (pinError ? "#ef4444" : "rgba(255,255,255,0.15)"), borderRadius:4, color:"#fff", fontFamily:"'Barlow Condensed'", fontSize:18, padding:"10px 12px", textAlign:"center", letterSpacing:"0.2em", outline:"none", marginBottom: pinError ? 6 : 16 }
      }),
      pinError ? e("div", { style:{ fontSize:10, color:"#ef4444", fontFamily:"'Barlow Condensed'", marginBottom:12 } },
        pinFlowMode === "new" ? "PIN must be at least 4 characters" : "Incorrect PIN — try again"
      ) : null,
      e("div", { style:{ display:"flex", gap:8 } },
        e("button", { onClick:function(){ setPinFlowMode(null); setPendingUser(null); setPinInput(""); setPinError(false); },
          style:{ flex:1, padding:"10px", fontFamily:"'Oswald'", fontSize:11, fontWeight:600, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.4)", borderRadius:4, cursor:"pointer" } }, "CANCEL"),
        pinFlowMode === "new" ? e("button", { onClick:handleSkipPin,
          style:{ flex:1, padding:"10px", fontFamily:"'Oswald'", fontSize:11, fontWeight:600, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", color:"rgba(255,255,255,0.4)", borderRadius:4, cursor:"pointer" } }, "SKIP") : null,
        e("button", { onClick:handlePinSubmit,
          style:{ flex:1, padding:"10px", fontFamily:"'Oswald'", fontSize:12, fontWeight:700, background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.4)", color:"#FFD700", borderRadius:4, cursor:"pointer" } },
          pinFlowMode === "new" ? "SET PIN" : "UNLOCK"
        )
      )
    )
  ) : null;

  // Sync status pill (bottom right)
  var syncPill = JSONBIN_ID !== "PASTE_BIN_ID_HERE" ? e("div", { style:{ position:"fixed", bottom:14, right:14, zIndex:500, display:"flex", alignItems:"center", gap:5, padding:"4px 10px", background:"rgba(0,0,0,0.6)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:20, fontFamily:"'Barlow Condensed'", fontSize:10, color:"rgba(255,255,255,0.35)" } },
    e("div", { style:{ width:6, height:6, borderRadius:"50%", background: syncStatus==="synced" ? "#4ade80" : syncStatus==="loading" ? "#FFD700" : "#94a3b8" } }),
    syncStatus === "loading" ? "connecting..." : syncStatus === "synced" ? "live" : "syncing..."
  ) : null;

  // Connecting banner shown while loading (non-blocking after safety timer)
  var connectingBanner = syncStatus === "loading" ? e("div", { style:{ background:"rgba(255,215,0,0.08)", borderBottom:"1px solid rgba(255,215,0,0.15)", padding:"8px 20px", textAlign:"center", fontSize:10, fontFamily:"'Barlow Condensed'", letterSpacing:"0.2em", color:"rgba(255,215,0,0.6)" } }, "⏳ LOADING BRACKETS...") : null;

  return e("div", { style:{ minHeight:"100vh", color:"#fff", position:"relative", overflow:"hidden" } },
    // Animated background
    e("div", { style:{ position:"fixed", inset:0, zIndex:0, pointerEvents:"none",
      background:"radial-gradient(ellipse at 20% 50%, rgba(0,61,165,0.12) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(255,179,0,0.08) 0%, transparent 50%), #06090f"
    } }),
    e("div", { style:{ position:"relative", zIndex:1 } },
      nav,
      connectingBanner,
      e("div", { style:contentStyle },
        screen === "admin" && showAdmin ? e(AdminPanel, { results:results, setResults:setResults, locked:locked, setLocked:setLocked, bracket:INITIAL_BRACKET }) : null,
        screen === "home" ? homeScreen : null,
        screen === "pick" ? pickScreen : null,
        screen === "leaderboard" ? e(Leaderboard, { users:users, results:results, bracket:INITIAL_BRACKET, setModalUser:setModalUser }) : null,
        screen === "history" ? e(HistoryScreen, null) : null,
        screen === "scoring" ? e(ScoringScreen, { setScreen:setScreen }) : null
      ),
      showAdmin && screen !== "admin" ? e("div", { style:{ position:"fixed", bottom:16, right:16 } },
        e("button", { onClick:function(){ setScreen("admin"); }, style:{ padding:"8px 14px", fontFamily:"'Oswald'", fontSize:11, fontWeight:600, letterSpacing:"0.1em", background:"rgba(239,68,68,0.15)", border:"1px solid rgba(239,68,68,0.3)", color:"#ef4444", borderRadius:4, cursor:"pointer" } }, "⚙️ ADMIN")
      ) : null
    ),
    modalUser ? e(BracketModal, { user:modalUser, results:results, bracket:INITIAL_BRACKET, onClose:function(){ setModalUser(null); } }) : null,
    pinModal,
    syncPill
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App, null));

  </script>
</body>
